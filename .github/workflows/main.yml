name: E-Redes Scraper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Executar Scraper
        env:
          EREDES_EMAIL: ${{ secrets.EREDES_EMAIL }}
          EREDES_PASSWORD: ${{ secrets.EREDES_PASSWORD }}
        run: |
          python scraper.py

      - name: Guardar Provas (Vídeo e Imagens)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provas-do-crime
          path: |
            ./*.png
            ./videos/*.webm
          retention-days: 1
