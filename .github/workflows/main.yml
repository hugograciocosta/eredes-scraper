name: E-Redes Scraper

on:
  workflow_dispatch: # Botão manual
  schedule:
    - cron: '0 8 * * *' # Execução automática diária (opcional)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Instalar Navegadores Playwright
        run: |
          playwright install --with-deps chromium

      - name: Executar Scraper
        env:
          EREDES_EMAIL: ${{ secrets.EREDES_EMAIL }}
          EREDES_PASSWORD: ${{ secrets.EREDES_PASSWORD }}
        run: |
          python scraper.py

      - name: Guardar Screenshots em caso de erro
        if: always() # Alterado para guardar SEMPRE, para podermos ver o progresso
        uses: actions/upload-artifact@v4 # Atualizado para v4
        with:
          name: debug-screenshots
          path: ./*.png
          retention-days: 1
