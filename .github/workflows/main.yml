name: E-Redes Scraper
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Navegador Virtual
        run: |
          pip install playwright
          playwright install firefox
          
      - name: Correr o Scraper
        env:
          EREDES_EMAIL: ${{ secrets.EREDES_EMAIL }}
          EREDES_PASSWORD: ${{ secrets.EREDES_PASSWORD }}
          EREDES_CPE: ${{ secrets.EREDES_CPE }}
        run: python scraper.py
